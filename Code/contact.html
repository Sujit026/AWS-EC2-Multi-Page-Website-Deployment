<!DOCTYPE html>
<html>
<head>
<title>Contact Me</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0d1117;
  color: white;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100vh;
}

/* Title */
h1 {
  margin-bottom: 25px;
}

/* Card */
.contact-card {
  background: #161b22;
  padding: 25px;
  border-radius: 12px;
  width: 300px;
  text-align: center;
  box-shadow: 0 4px 20px rgba(0,0,0,0.5);
}

/* Links */
.contact-card a {
  display: block;
  margin: 12px 0;
  padding: 10px;
  text-decoration: none;
  color: white;
  border-radius: 6px;
  font-weight: bold;
}

/* Different colors */
.linkedin {
  background: #0a66c2;
}

.github {
  background: #238636;
}

.contact-card a:hover {
  opacity: 0.85;
}

/* Button */
button {
  margin-top: 20px;
  padding: 10px 20px;
  background: #30363d;
  color: white;
  border: none;
  border-radius: 6px;
  cursor: pointer;
}

button:hover {
  background: #484f58;
}
</style>

</head>

<body>

<h1>Contact Me</h1>

<div class="contact-card">
  <a href="http://www.linkedin.com/in/sujit-deshmukh-9b6589201" target="_blank" class="linkedin">
    🔗 LinkedIn Profile
  </a>

  <a href="https://github.com/Sujit026" target="_blank" class="github">
    💻 GitHub Profile
  </a>
</div>

<button onclick="location.href='index.html'">Home</button>

</body>
</html>
